trigger:
  branches:
    include:
      - main
      - master

pr: none

pool:
  name: Default

variables:
  NODE_VERSION: '20'

steps:
- checkout: self
  fetchDepth: 2

- task: NodeTool@0
  displayName: Setup Node.js $(NODE_VERSION)
  inputs:
    versionSpec: $(NODE_VERSION)

- script: npm install @anthropic-ai/sdk
  displayName: Install Anthropic SDK

- script: node scripts/tech-debt.mjs
  displayName: Detect tech debt and create Work Item
  env:
    ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
    AZURE_DEVOPS_TOKEN: $(System.AccessToken)
    ORGANIZATION: $(System.TeamFoundationCollectionUri)
    PROJECT: $(System.TeamProject)
    COMMIT_SHA: $(Build.SourceVersion)
    COMMIT_MESSAGE: $(Build.SourceVersionMessage)
    COMMIT_AUTHOR: $(Build.RequestedFor)
    REPO: $(Build.Repository.Name)