trigger: none

pr:
  branches:
    include:
      - main

pool:
  name: Default
  # vmImage: 'ubuntu-latest'

variables:
  NODE_VERSION: '20'

steps:
- checkout: self
  fetchDepth: 0

- task: NodeTool@0
  displayName: Setup Node.js $(NODE_VERSION)
  inputs:
    versionSpec: $(NODE_VERSION)

- script: npm install @anthropic-ai/sdk
  displayName: Install Anthropic SDK

- script: node .azure/scripts/review.mjs
  displayName: AI Code Review con Claude
  env:
    ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
    AZURE_DEVOPS_TOKEN: $(System.AccessToken)
    ORGANIZATION: $(System.TeamFoundationCollectionUri)
    PROJECT: $(System.TeamProject)
    REPO_ID: $(Build.Repository.ID)
    PR_ID: $(System.PullRequest.PullRequestId)
    BASE_SHA: $(System.PullRequest.TargetBranchName)
    HEAD_SHA: $(System.PullRequest.SourceCommitId)